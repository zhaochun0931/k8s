apiVersion: v1
kind: Pod
metadata:
  name: busybox-config-test
spec:
  containers:
    - name: busybox-container
      image: busybox:latest
      # We print the specific variable to prove it was loaded
      command: ["/bin/sh", "-c", "echo The value is: $MY_CUSTOM_VAR && sleep 3600"]
      env:
        - name: MY_CUSTOM_VAR  # This is the name inside the container
          valueFrom:
            configMapKeyRef:
              name: my-configmap
              key: username  # Replace this with the actual key in your ConfigMap
