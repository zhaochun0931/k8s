apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-clusterip-test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: clusterip-web
  template:
    metadata:
      labels:
        app: clusterip-web
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        # This command writes the Pod's hostname to the index file
        command: ["/bin/sh", "-c"]
        args:
          - echo "Hello from Pod $(hostname)" > /usr/share/nginx/html/index.html && nginx -g "daemon off;"
        ports:
        - containerPort: 80
