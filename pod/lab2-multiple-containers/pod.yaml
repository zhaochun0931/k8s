apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  containers:
  # Container 1: The primary app
  - name: web-server
    image: nginx
    ports:
    - containerPort: 80

  # Container 2: The sidecar helper
  - name: sidecar-worker
    image: busybox
    command: ["/bin/sh", "-c", "while true; do echo 'Sidecar is running'; sleep 30; done"]
