apiVersion: v1
kind: Pod
metadata:
  name: persistent-shared-pod
spec:
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: shared-pvc  # Must match the name in the PVC manifest

  containers:
  - name: writer
    image: busybox
    command: ["/bin/sh", "-c", "echo 'Stored safely' > /data/stable.txt; sleep 3600"]
    volumeMounts:
    - name: persistent-storage
      mountPath: /data

  - name: reader
    image: busybox
    command: ["/bin/sh", "-c", "while true; do cat /data/stable.txt; sleep 10; done"]
    volumeMounts:
    - name: persistent-storage
      mountPath: /app/data
