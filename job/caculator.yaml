apiVersion: batch/v1
kind: Job
metadata:
  name: math-calculator
spec:
  template:
    spec:
      containers:
      - name: calculator
        image: busybox
        command: ["sh", "-c", "echo 'scale=2; 22/7' | bc -l"]
      restartPolicy: Never # Jobs must use Never or OnFailure
  backoffLimit: 4 # How many times to retry before giving up
